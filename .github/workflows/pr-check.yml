name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zklms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zklms_test
        run: npx prisma migrate deploy

      - name: Run backend tests
        id: backend-tests
        working-directory: backend
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zklms_test
          JWT_SECRET: test-jwt-secret-for-ci
          JWT_EXPIRES_IN: 7d
          NODE_ENV: test
          PORT: 4000
        run: |
          npm run test:coverage -- --json --outputFile=test-results.json 2>&1 | tee test-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        id: frontend-lint
        working-directory: frontend
        continue-on-error: true
        run: |
          npm run lint 2>&1 | tee lint-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Build frontend
        id: frontend-build
        working-directory: frontend
        continue-on-error: true
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
        run: |
          npm run build 2>&1 | tee build-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Create PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let backendStatus = '${{ steps.backend-tests.outcome }}' === 'success' ? '✅' : '❌';
            let lintStatus = '${{ steps.frontend-lint.outcome }}' === 'success' ? '✅' : '❌';
            let buildStatus = '${{ steps.frontend-build.outcome }}' === 'success' ? '✅' : '❌';

            const body = `## 🧪 Test Results Summary

            | Check | Status |
            |-------|--------|
            | Backend Tests | ${backendStatus} |
            | Frontend Lint | ${lintStatus} |
            | Frontend Build | ${buildStatus} |

            <details>
            <summary>📋 Details</summary>

            ### Backend Tests
            \`\`\`
            ${fs.existsSync('backend/test-output.txt') ? fs.readFileSync('backend/test-output.txt', 'utf8').slice(-2000) : 'No output available'}
            \`\`\`

            ### Frontend Lint
            \`\`\`
            ${fs.existsSync('frontend/lint-output.txt') ? fs.readFileSync('frontend/lint-output.txt', 'utf8').slice(-1000) : 'No output available'}
            \`\`\`

            </details>

            ---
            *Generated by GitHub Actions*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Test Results Summary')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
